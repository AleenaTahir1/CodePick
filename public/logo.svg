<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3004c"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="104" height="104" rx="28" fill="url(#bgGrad)"/>
  <rect x="8" y="8" width="104" height="104" rx="28" fill="url(#shineGrad)"/>

  <!-- Code brackets < > -->
  <path d="M36 48 L22 60 L36 72" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <path d="M84 48 L98 60 L84 72" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- Chat bubble dots -->
  <circle cx="49" cy="60" r="4.5" fill="#fff" opacity="0.9"/>
  <circle cx="60" cy="60" r="4.5" fill="#fff" opacity="0.9"/>
  <circle cx="71" cy="60" r="4.5" fill="#fff" opacity="0.9"/>

  <!-- Small antenna / bot indicator -->
  <line x1="60" y1="8" x2="60" y2="0" stroke="#db2777" stroke-width="3" stroke-linecap="round"/>
  <circle cx="60" cy="0" r="3" fill="#f472b6"/>
</svg>
