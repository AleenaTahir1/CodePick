server {
    listen 80;
    server_name localhost;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect root to /CodePick/
    location = / {
        return 301 /CodePick/;
    }

    # Serve the app under /CodePick/
    location /CodePick/ {
        try_files $uri $uri/ /CodePick/index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
